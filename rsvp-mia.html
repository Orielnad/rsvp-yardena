<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אישור הגעה – סעודת הודיה מיה אלה</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Assistant', sans-serif;
    background: linear-gradient(135deg, #fff5f0 0%, #ffeef5 50%, #fff0f8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(220,150,170,0.18), 0 2px 8px rgba(220,150,170,0.10);
    max-width: 520px; width: 100%;
    padding: 0 0 36px;
    border: 1.5px solid rgba(240,180,200,0.3);
    overflow: hidden;
  }

  .invite-img {
    width: 100%;
    display: block;
    border-radius: 22px 22px 0 0;
    object-fit: cover;
  }

  .form-area {
    padding: 28px 36px 0;
  }

  .divider {
    border: none;
    border-top: 1.5px solid #f5d5e5;
    margin: 20px 0;
  }

  .form-title {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: #c0607a;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    color: #c0607a;
    margin-bottom: 7px;
  }

  input[type="text"] {
    width: 100%;
    padding: 11px 15px;
    border: 1.5px solid #f0c8d8;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Assistant', sans-serif;
    color: #7a3a50;
    background: rgba(255,255,255,0.9);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    direction: rtl;
  }
  input[type="text"]:focus {
    border-color: #e090aa;
    box-shadow: 0 0 0 3px rgba(220,130,160,0.13);
  }

  .radio-group { display: flex; gap: 12px; }
  .radio-option { flex: 1; position: relative; }
  .radio-option input { position: absolute; opacity: 0; width: 0; }
  .radio-option label {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 10px;
    border: 1.5px solid #f0c8d8; border-radius: 12px;
    cursor: pointer; font-size: 0.95rem; color: #c0607a;
    background: rgba(255,255,255,0.7);
    transition: all 0.2s; font-weight: 400; margin-bottom: 0;
  }
  .radio-option input:checked + label {
    background: linear-gradient(135deg, #fdd8e8, #f5b8d0);
    border-color: #e090aa; color: #7a2a48; font-weight: 600;
    box-shadow: 0 2px 8px rgba(220,130,160,0.2);
  }
  .radio-option label:hover {
    border-color: #e8a0c0;
    background: rgba(255,220,235,0.2);
  }

  .submit-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #e890aa, #c86080);
    color: white; border: none; border-radius: 14px;
    font-size: 1.1rem; font-family: 'Assistant', sans-serif;
    font-weight: 700; cursor: pointer; letter-spacing: 1px;
    margin-top: 20px; transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(200,100,130,0.3);
  }
  .submit-btn:hover {
    background: linear-gradient(135deg, #d87898, #b05070);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(200,100,130,0.4);
  }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .error-msg {
    color: #c05068;
    font-size: 0.85rem;
    margin-top: 8px;
    text-align: center;
    display: none;
  }

  .success-screen {
    display: none; text-align: center;
    padding: 40px 36px; animation: fadeIn 0.5s ease;
  }
  .success-icon { font-size: 4rem; margin-bottom: 16px; animation: pop 0.5s ease; }
  .success-screen h2 { font-size: 1.6rem; color: #c0607a; margin-bottom: 10px; }
  .success-screen p { color: #b08090; font-size: 1rem; line-height: 1.6; }

  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confetti-piece { position: absolute; animation: confettiFall linear forwards; }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); }
  }

  @media (max-width: 500px) {
    .form-area { padding: 22px 18px 0; }
    .success-screen { padding: 30px 18px; }
  }
</style>
</head>

  <div class="form-area" id="rsvp-form">
    <hr class="divider" style="margin-top:0;">
    <p class="form-title">🎀 אנא אשרו הגעה</p>

    <div class="form-group">
      <label>שם מלא</label>
      <input type="text" id="name" placeholder="שם ושם משפחה" />
    </div>

    <div class="form-group">
      <label>מספר טלפון 📱</label>
      <input type="text" id="phone" placeholder="05x-xxxxxxx" inputmode="numeric" />
    </div>

    <div class="form-group">
      <label>האם תגיעו? 💌</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="attendance" id="yes" value="yes" onchange="toggleGuests()">
          <label for="yes">✅ מגיעים בשמחה!</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="attendance" id="no" value="no" onchange="toggleGuests()">
          <label for="no">😔 לא נוכל הפעם</label>
        </div>
      </div>
    </div>

    <div class="form-group" id="guests-group" style="display:none;">
      <label>כמה תגיעו? 👫</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="guests" id="alone" value="אגיע לבד">
          <label for="alone">🙋 אגיע לבד</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="guests" id="couple" value="אגיע עם בן/בת זוג">
          <label for="couple">👫 עם בן/בת זוג</label>
        </div>
      </div>
    </div>

    <div class="form-group" id="children-group" style="display:none;">
      <label>האם תגיעו עם ילדים? 👶</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="children" id="no-children" value="לא" onchange="toggleChildrenCount()">
          <label for="no-children">🙅 לא</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="children" id="yes-children" value="כן" onchange="toggleChildrenCount()">
          <label for="yes-children">👶 כן</label>
        </div>
      </div>
    </div>

    <div class="form-group" id="children-count-group" style="display:none;">
      <label>כמה ילדים? 🧒</label>
      <input type="text" id="children-count" placeholder="מספר ילדים" inputmode="numeric" />
    </div>

    <p class="error-msg" id="error-msg">אנא מלאו את כל השדות</p>
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">שלחו אישור 🎀</button>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">🎀</div>
    <h2 id="success-title">תודה רבה!</h2>
    <p id="success-msg"></p>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzV4GlSNopO2mnKVJyLXs0uLzOcLmea3MtiXMBoUQnI9-GjoQT65yB8e9Zlj8oTkXRE/exec';

  function toggleGuests() {
    const attendance = document.querySelector('input[name="attendance"]:checked');
    const guestsGroup = document.getElementById('guests-group');
    const childrenGroup = document.getElementById('children-group');
    const childrenCountGroup = document.getElementById('children-count-group');
    if (attendance && attendance.value === 'yes') {
      guestsGroup.style.display = 'block';
      childrenGroup.style.display = 'block';
    } else {
      guestsGroup.style.display = 'none';
      childrenGroup.style.display = 'none';
      childrenCountGroup.style.display = 'none';
    }
  }

  function toggleChildrenCount() {
    const children = document.querySelector('input[name="children"]:checked');
    const countGroup = document.getElementById('children-count-group');
    countGroup.style.display = (children && children.value === 'כן') ? 'block' : 'none';
  }

  function launchConfetti() {
    const colors = ['#f5b8d0','#fdd8e8','#e8c0d0','#f0d0b8','#d4a8b8','#ffffff','#f5d0b0'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      const size = (Math.random() * 9 + 5) + 'px';
      piece.style.width = size;
      piece.style.height = size;
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
      piece.style.animationDelay = (Math.random() * 1.2) + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 5000);
    }
  }

  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const attendance = document.querySelector('input[name="attendance"]:checked');
    const guests = document.querySelector('input[name="guests"]:checked');
    const errorMsg = document.getElementById('error-msg');

    if (!name || !phone || !attendance) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = !name ? 'אנא הכניסו שם מלא' : !phone ? 'אנא הכניסו מספר טלפון' : 'אנא סמנו האם תגיעו';
      return;
    }
    if (attendance.value === 'yes' && !guests) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = 'אנא סמנו כמה תגיעו';
      return;
    }
    errorMsg.style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    const coming = attendance.value === 'yes';
    const timestamp = new Date().toLocaleString('he-IL', {timeZone:'Asia/Jerusalem'});
    const guestsVal = coming ? (guests?.value === 'אגיע לבד' ? 1 : 2) : '';

    try {
      const childrenVal = document.querySelector('input[name="children"]:checked')?.value || '';
      const childrenCount = childrenVal === 'כן' ? (document.getElementById('children-count').value.trim() || '0') : '0';
      const params = new URLSearchParams({
        name: name,
        phone: phone,
        attendance: coming ? 'מגיע/ה' : 'לא מגיע/ה',
        guests: guestsVal,
        children: childrenCount,
        timestamp: timestamp
      });
      await fetch(SCRIPT_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
    } catch(e) {
      console.log('Could not save:', e);
    }

    document.getElementById('rsvp-form').style.display = 'none';
    const success = document.getElementById('success-screen');
    success.style.display = 'block';

    if (coming) {
      document.getElementById('success-title').textContent = '🎉 כמה כיף שתגיעו!';
      document.getElementById('success-msg').innerHTML =
        `${name} היקר/ה,<br>נשמח לראותכם בסעודת ההודיה של מיה אלה! 🎀<br><br>📅 24.07.2026 | 11:30<br>📍 היכל נחום, מודיעין`;
      setTimeout(launchConfetti, 200);
    } else {
      document.getElementById('success-title').textContent = 'תודה על העדכון';
      document.getElementById('success-msg').innerHTML =
        `${name} היקר/ה,<br>חבל שלא תוכלו להגיע 😔<br>נשמח לראותכם בפעם אחרת! 💕`;
    }
  }
</script>
</body>
</html>
