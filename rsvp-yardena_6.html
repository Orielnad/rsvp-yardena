<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שישים ושירים לירדנה</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Assistant', sans-serif;
    background: linear-gradient(135deg, #fdf6f8 0%, #f5eef5 50%, #fdf0f5 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }
  .petal { position: fixed; pointer-events: none; opacity: 0.18; z-index: 0; }
  .petal svg { width: 100%; height: 100%; }
  .petal-tl { top: -30px; left: -30px; width: 280px; height: 280px; }
  .petal-tr { top: -30px; right: -30px; width: 280px; height: 280px; transform: scaleX(-1); }
  .petal-bl { bottom: -30px; left: -30px; width: 240px; height: 240px; transform: scaleY(-1); }
  .petal-br { bottom: -30px; right: -30px; width: 240px; height: 240px; transform: scale(-1); }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(180,130,160,0.18), 0 2px 8px rgba(180,130,160,0.10);
    max-width: 520px; width: 100%;
    padding: 0 0 36px;
    border: 1.5px solid rgba(200,160,190,0.25);
    overflow: hidden;
  }

  /* Invitation image at top */
  .invite-img {
    width: 100%;
    display: block;
    border-radius: 22px 22px 0 0;
    object-fit: cover;
  }

  .form-area {
    padding: 28px 36px 0;
  }

  .divider {
    border: none;
    border-top: 1.5px solid #e8d0e0;
    margin: 20px 0;
  }

  .form-title {
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: #7a4d6b;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    color: #7a4d6b;
    margin-bottom: 7px;
  }

  input[type="text"] {
    width: 100%;
    padding: 11px 15px;
    border: 1.5px solid #e0c8d8;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Assistant', sans-serif;
    color: #5a3a50;
    background: rgba(255,255,255,0.85);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    direction: rtl;
  }
  input[type="text"]:focus {
    border-color: #c090b0;
    box-shadow: 0 0 0 3px rgba(180,120,160,0.13);
  }

  .radio-group { display: flex; gap: 12px; }
  .radio-option { flex: 1; position: relative; }
  .radio-option input { position: absolute; opacity: 0; width: 0; }
  .radio-option label {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 10px;
    border: 1.5px solid #e0c8d8; border-radius: 12px;
    cursor: pointer; font-size: 0.95rem; color: #7a4d6b;
    background: rgba(255,255,255,0.7);
    transition: all 0.2s; font-weight: 400; margin-bottom: 0;
  }
  .radio-option input:checked + label {
    background: linear-gradient(135deg, #e8c8da, #d4a8c8);
    border-color: #c090b0; color: #5a2a48; font-weight: 600;
    box-shadow: 0 2px 8px rgba(180,120,160,0.2);
  }
  .radio-option label:hover {
    border-color: #c8a0bc;
    background: rgba(220,180,210,0.15);
  }

  .submit-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #c090b0, #a06890);
    color: white; border: none; border-radius: 14px;
    font-size: 1.1rem; font-family: 'Assistant', sans-serif;
    font-weight: 700; cursor: pointer; letter-spacing: 1px;
    margin-top: 20px; transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(160,100,140,0.3);
  }
  .submit-btn:hover {
    background: linear-gradient(135deg, #b080a0, #906080);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(160,100,140,0.4);
  }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .success-screen {
    display: none; text-align: center;
    padding: 40px 36px; animation: fadeIn 0.5s ease;
  }
  .success-icon { font-size: 4rem; margin-bottom: 16px; animation: pop 0.5s ease; }
  .success-screen h2 { font-size: 1.6rem; color: #6b3a5d; margin-bottom: 10px; }
  .success-screen p { color: #9a6888; font-size: 1rem; line-height: 1.6; }

  .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confetti-piece { position: absolute; animation: confettiFall linear forwards; }

  .error-msg {
    color: #c0506a;
    font-size: 0.85rem;
    margin-top: 8px;
    text-align: center;
    display: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); }
  }

  @media (max-width: 500px) {
    .form-area { padding: 22px 18px 0; }
    .success-screen { padding: 30px 18px; }
    .petal-tl, .petal-tr { width: 160px; height: 160px; }
    .petal-bl, .petal-br { width: 140px; height: 140px; }
  }
</style>
</head>

lrabX9gktl3cKfU1gl9hvNM7uJG9BK31a8DPzypPFlix1nfn4ALz4ynhbo7FKGeCkj/9k=" alt="הזמנה לשלש שירים" />

  <!-- Form below the image -->
  <div class="form-area" id="rsvp-form">
    <hr class="divider" style="margin-top:0;">
    <p class="form-title">✉️ אנא אשרו הגעה</p>

    <div class="form-group">
      <label>שם מלא</label>
      <input type="text" id="name" placeholder="שם ושם משפחה" />
    </div>

    <div class="form-group">
      <label>האם תגיעו? 💌</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="attendance" id="yes" value="yes">
          <label for="yes">✅ מגיעים בשמחה!</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="attendance" id="no" value="no">
          <label for="no">😔 לא נוכל הפעם</label>
        </div>
      </div>
    </div>

    <p class="error-msg" id="error-msg">אנא מלאו את כל השדות</p>
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">שלחו אישור 🌸</button>
  </div>

  <!-- Success screen -->
  <div class="success-screen" id="success-screen">
    <div class="success-icon">🌸</div>
    <h2 id="success-title">תודה רבה!</h2>
    <p id="success-msg"></p>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  // ⬇️ הכניסו כאן את ה-URL של ה-Google Apps Script שלכם
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyvccuPoUwNW8ScuxBMSVSSacm41enVA-_-g2w-WTOAfdBSXyi4gvjmT9PFw0qng8juw/exec';

  function launchConfetti() {
    const colors = ['#c9a0b8','#d4b8cc','#b8c0d8','#e8c8da','#a090c0','#f0d8e8','#ffffff'];
    const container = document.getElementById('confetti');
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      const size = (Math.random() * 9 + 5) + 'px';
      piece.style.width = size;
      piece.style.height = size;
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (Math.random() * 2.5 + 1.5) + 's';
      piece.style.animationDelay = (Math.random() * 1.2) + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 5000);
    }
  }

  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    const attendance = document.querySelector('input[name="attendance"]:checked');
    const errorMsg = document.getElementById('error-msg');

    if (!name || !attendance) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = !name ? 'אנא הכניסו שם מלא' : 'אנא סמנו האם תגיעו';
      return;
    }
    errorMsg.style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    const coming = attendance.value === 'yes';
    const timestamp = new Date().toLocaleString('he-IL', {timeZone:'Asia/Jerusalem'});

    // Send to Google Sheets
    try {
      const params = new URLSearchParams({
        name: name,
        attendance: coming ? 'מגיע/ה' : 'לא מגיע/ה',
        timestamp: timestamp
      });
      await fetch('https://script.google.com/macros/s/AKfycbxyvccuPoUwNW8ScuxBMSVSSacm41enVA-_-g2w-WTOAfdBSXyi4gvjmT9PFw0qng8juw/exec?' + params.toString(), {
        method: 'GET',
        mode: 'no-cors'
      });
    } catch(e) {
      console.log('Could not save:', e);
    }

    // Show success
    document.getElementById('rsvp-form').style.display = 'none';
    const success = document.getElementById('success-screen');
    success.style.display = 'block';

    if (coming) {
      document.getElementById('success-title').textContent = '🎉 כמה כיף שתגיעו!';
      document.getElementById('success-msg').innerHTML =
        `${name} היקר/ה,<br>מחכים לכם לערב מרגש של שירים ושמחה! 🎶<br><br>📅 25.06.2026 | 19:45<br>📍 היכל נחום, מודיעין`;
      setTimeout(launchConfetti, 200);
    } else {
      document.getElementById('success-title').textContent = 'תודה על העדכון';
      document.getElementById('success-msg').innerHTML =
        `${name} היקר/ה,<br>חבל שלא תוכלו להגיע 😔<br><br>🤫 תזכרו — זו הפתעה!<br>לא מספרים לירדנה!`;
    }
  }
</script>
</body>
</html>
